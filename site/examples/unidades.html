<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<style>
	
		#button{
			font-size: 1rem;
			padding: 0.5em 1em;
		}
		#entrada{ display: block; margin: 0.5em;}
		#auxiliar{ display: inline-block; margin: 0.5rem; padding: 0.5rem; }
		.succefull { background-color: rgb(133, 249, 133);}
		.warning { background-color: rgb(255, 2, 2);}
		.explanation{
			display: block;
		}
	</style>
</head>
<body>
	
	<input id="entrada" type="text" placeholder="Enter Text">

	<button id="button">Hello Word</button>
	<div id="auxiliar"></div>

	
	<script>
		const button = document.getElementById('button')
		const entrada =  document.getElementById('entrada')
		const auxiliar = document.getElementById('auxiliar')



		function changeText(e){

			button.textContent = e.target.value

			if(e.target.value.length === 0){
				button.textContent = 'Hello Word'
				auxiliar.removeAttribute('class')
				auxiliar.textContent = ''
			}
			else if(e.target.value.length <= 5){
				auxiliar.setAttribute('class','succefull')
				auxiliar.textContent = 'Longer is OK!'
				
			}
			else if(e.target.value.length >= 6){
				auxiliar.setAttribute('class','warning')
				auxiliar.textContent = 'Longer is Excess!!'
			}

		}
		entrada.addEventListener('keyup', changeText)
	</script>
</body>
</html>
